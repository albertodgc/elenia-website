<!DOCTYPE html>
<html lang="es-CO">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background:
      radial-gradient(ellipse at 85% 20%, rgba(37,211,102,0.25) 0%, transparent 55%),
      radial-gradient(ellipse at 10% 100%, rgba(14,165,233,0.18) 0%, transparent 55%),
      linear-gradient(135deg, #14532D 0%, #030712 100%);
    color: #fff;
    padding: 72px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .dots {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.06) 1px, transparent 0);
    background-size: 24px 24px;
    pointer-events: none;
  }
  .row { display: flex; align-items: center; gap: 20px; position: relative; z-index: 1; }
  .logo {
    width: 88px; height: 88px; border-radius: 20px;
    background: linear-gradient(135deg, #25D366, #15803D);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 32px rgba(37,211,102,0.35);
  }
  .logo svg { width: 52px; height: 52px; }
  .brand { font-weight: 900; font-size: 52px; letter-spacing: -0.02em; }
  .badge {
    display: inline-flex; align-items: center; gap: 10px;
    background: rgba(37,211,102,0.15);
    border: 1px solid rgba(37,211,102,0.4);
    color: #A7F3D0;
    padding: 10px 18px; border-radius: 999px;
    font-size: 18px; font-weight: 600;
    align-self: flex-start;
    position: relative; z-index: 1;
    margin-bottom: 24px;
  }
  .badge .dot { width: 8px; height: 8px; border-radius: 50%; background: #25D366; box-shadow: 0 0 12px #25D366; }
  h1 {
    font-size: 78px; font-weight: 900; line-height: 1.02;
    letter-spacing: -0.03em;
    position: relative; z-index: 1;
    max-width: 1000px;
  }
  h1 .accent {
    background: linear-gradient(135deg, #34D399, #67E8F9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .footer {
    display: flex; align-items: center; justify-content: space-between;
    position: relative; z-index: 1;
  }
  .tag { font-size: 22px; color: #D1D5DB; font-weight: 500; }
  .tag strong { color: #fff; font-weight: 700; }
  .price {
    font-size: 22px; font-weight: 700; color: #fff;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 12px 20px; border-radius: 14px;
    backdrop-filter: blur(8px);
  }
  .price span { color: #34D399; }
</style>
</head>
<body>
  <div class="dots"></div>

  <div>
    <div class="row">
      <div class="logo">
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <path fill="#fff" d="M32 14c-10.5 0-19 7.6-19 17 0 3.4 1.2 6.6 3.2 9.2L14 50l10.2-2.6c2.4 1 5 1.6 7.8 1.6 10.5 0 19-7.6 19-17S42.5 14 32 14z"/>
          <circle cx="25" cy="31" r="2.4" fill="#15803D"/>
          <circle cx="32" cy="31" r="2.4" fill="#15803D"/>
          <circle cx="39" cy="31" r="2.4" fill="#15803D"/>
        </svg>
      </div>
      <div class="brand">Elenia</div>
    </div>
  </div>

  <div>
    <div class="badge"><span class="dot"></span> La recepcionista #1 por WhatsApp en Colombia</div>
    <h1>Tu negocio atendido <span class="accent">24/7</span>, sin contratar a nadie.</h1>
  </div>

  <div class="footer">
    <div class="tag">Agenda citas. Responde preguntas. Recupera clientes.</div>
    <div class="price"><span>$99.000</span>/mes</div>
  </div>
</body>
</html>
